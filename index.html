                                    <button
                                      onClick={() => handleEditTaskClick(task)}
                                      className="p-1 text-slate-500 hover:text-indigo-600 hover:bg-slate-100 rounded transition"
                                    >
                                      <Icon name="edit" className="w-4 h-4" />
                                    </button>
                                    <button
                                      onClick={() => handleDeleteTask(task.id)}
                                      className="p-1 text-slate-500 hover:text-rose-600 hover:bg-slate-100 rounded transition"
                                    >
                                      <Icon name="trash" className="w-4 h-4" />
                                    </button>
                                  </div>
                                </td>
                              </tr>
                            );
                          })
                        )}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            )}

            {/* Gantt View */}
            {activeTab === 'gantt' && (
              <div className="space-y-4">
                <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-4 overflow-hidden">
                  <div className="mb-4 border-b border-slate-100 pb-3 flex flex-col sm:flex-row sm:items-center justify-between gap-3">
                    <div>
                      <h2 className="text-sm font-bold text-indigo-950 flex items-center gap-1.5">
                        <span className="w-2 h-2 rounded-full bg-indigo-600 inline-block"></span>
                        16-Month Interactive Gantt Matrix (Columns P to AE)
                      </h2>
                      <p className="text-xs text-slate-500">Visual mapping across full delivery phases from April 2026 to July 2027.</p>
                    </div>

                    <div className="flex flex-wrap items-center gap-4">
                      <div className="flex items-center gap-4 text-xs font-semibold text-slate-500 bg-slate-50 px-3 py-1.5 rounded-lg border border-slate-200">
                        <div className="flex items-center gap-1.5">
                          <span className="w-3 h-3 rounded bg-emerald-500"></span> Complete
                        </div>
                        <div className="flex items-center gap-1.5">
                          <span className="w-3 h-3 rounded bg-indigo-600"></span> In Progress
                        </div>
                        <div className="flex items-center gap-1.5">
                          <span className="w-3 h-3 rounded bg-rose-500 animate-pulse"></span> Blocked
                        </div>
                        <div className="flex items-center gap-1.5">
                          <span className="w-3 h-3 rounded bg-slate-300"></span> Planned
                        </div>
                      </div>
                    </div>
                  </div>

                  <div className="overflow-x-auto border border-slate-200 rounded-xl max-w-full">
                    <div className="min-w-[1200px] divide-y divide-slate-100 bg-white">
                      
                      {/* Timeline Header */}
                      <div className="grid grid-cols-[220px_1fr] bg-slate-50/80 font-bold text-[10px] text-slate-600 uppercase tracking-wider text-center sticky top-0 border-b border-slate-200">
                        <div className="px-4 py-3 text-left border-r border-slate-200">Task Deliverable</div>
                        <div className="grid grid-cols-16 divide-x divide-slate-200">
                          {months.map((m, idx) => {
                            const isCurrent = idx === currentMonthIndex;
                            return (
                              <div 
                                key={m} 
                                className={`py-3 relative flex flex-col justify-center items-center ${
                                  isCurrent ? 'bg-indigo-50 font-black text-indigo-700 border-x-2 border-indigo-400' : ''
                                }`}
                              >
                                {m}
                                {isCurrent && (
                                  <span className="absolute bottom-0.5 text-[8px] bg-indigo-600 text-white px-1.5 rounded font-bold uppercase scale-90">
                                    Current
                                  </span>
                                )}
                              </div>
                            );
                          })}
                        </div>
                      </div>

                      {/* Timeline Bars */}
                      {filteredTasks.length === 0 ? (
                        <div className="text-center py-10 text-slate-400 font-semibold">
                          No tasks found. Reset filter selections to view Gantt mapping.
                        </div>
                      ) : (
                        filteredTasks.map(task => {
                          let barTheme = 'bg-slate-300 hover:bg-slate-400 text-slate-700';
                          if (task.status === 'Complete') {
                            barTheme = 'bg-emerald-500 hover:bg-emerald-600 text-white';
                          } else if (task.status === 'In Progress') {
                            barTheme = 'bg-indigo-600 hover:bg-indigo-700 text-white';
                          } else if (task.status === 'Blocked') {
                            barTheme = 'bg-rose-500 hover:bg-rose-600 text-white animate-pulse';
                          }

                          return (
                            <div key={task.id} className="grid grid-cols-[220px_1fr] items-center hover:bg-slate-50/40 transition duration-150 py-1.5">
                              <div className="px-4 pr-2 text-left border-r border-slate-200 truncate">
                                <div className="flex items-center gap-1">
                                  <span className="text-[10px] font-bold text-slate-900">{task.id}</span>
                                  <span className="text-[10px] font-semibold text-slate-500 truncate" title={task.name}>
                                    {task.name}
                                  </span>
                                </div>
                                <div className="flex items-center gap-2 mt-0.5 text-[8px] text-slate-400 font-medium">
                                  <span className="bg-slate-100 text-slate-600 px-1 py-0.5 rounded uppercase">{task.phase}</span>
                                  <span>{task.complete}%</span>
                                </div>
                              </div>

                              <div className="grid grid-cols-16 h-8 relative divide-x divide-slate-100">
                                <div className="col-start-2 col-span-1 h-full bg-indigo-50/20 pointer-events-none z-0 absolute top-0 bottom-0 left-0 right-0"></div>

                                <div 
                                  className="relative h-6 rounded-lg shadow-sm font-bold text-[10px] flex items-center justify-between px-2 cursor-pointer z-10 select-none overflow-hidden transition-all"
                                  style={{
                                    gridColumnStart: task.start + 1,
                                    gridColumnEnd: task.end + 2
                                  }}
                                  onClick={() => handleEditTaskClick(task)}
                                >
                                  <div className={`absolute top-0 bottom-0 left-0 ${barTheme}`} style={{ width: `${task.complete}%`, opacity: 0.95 }}></div>
                                  <span className="z-10 text-white font-extrabold truncate drop-shadow-sm flex items-center gap-1 px-1 py-0.5">
                                    {task.complete === 100 && '✓'} {task.name}
                                  </span>
                                  <span className="z-10 text-white font-black drop-shadow-sm pr-1 bg-slate-900/10 px-1.5 rounded-full scale-90">
                                    {task.complete}%
                                  </span>
                                </div>
                              </div>
                            </div>
                          );
                        })
                      )}

                    </div>
                  </div>
                </div>
              </div>
            )}

          </main>

          {/* Edit Task Modal */}
          {isTaskModalOpen && editingTask && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4 animate-fade-in">
              <div className="bg-white rounded-2xl border border-slate-200 shadow-2xl w-full max-w-lg overflow-hidden animate-slide-up">
                <div className="p-5 bg-gradient-to-r from-slate-900 to-indigo-950 text-white flex items-center justify-between">
                  <div>
                    <h3 className="text-lg font-bold">Edit Implementation Deliverable</h3>
                    <p className="text-xs text-indigo-200">Refine task configuration parameters and milestones</p>
                  </div>
                  <button 
                    type="button"
                    onClick={() => setIsTaskModalOpen(false)}
                    className="text-slate-300 hover:text-white font-bold text-xl p-1 bg-white/10 hover:bg-white/25 rounded-full w-8 h-8 flex items-center justify-center transition"
                  >
                    ×
                  </button>
                </div>

                <form onSubmit={handleSaveTask} className="p-6 space-y-4">
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-xs font-bold text-slate-700 uppercase mb-1">Task ID</label>
                      <input
                        type="text"
                        disabled
                        value={editingTask.id}
                        className="w-full bg-slate-100 border border-slate-200 rounded-lg p-2 text-xs font-mono font-bold text-slate-600"
                      />
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-slate-700 uppercase mb-1">Workstream</label>
                      <select
                        value={editingTask.workstream}
                        onChange={(e) => setEditingTask({ ...editingTask, workstream: e.target.value })}
                        className="w-full bg-white border border-slate-300 rounded-lg p-2 text-xs font-bold text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500"
                      >
                        {workstreamsList.filter(ws => ws !== 'All').map(ws => (
                          <option key={ws} value={ws}>{ws}</option>
                        ))}
                      </select>
                    </div>
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-slate-700 uppercase mb-1">Task Name</label>
                    <input
                      type="text"
                      required
                      value={editingTask.name}
                      onChange={(e) => setEditingTask({ ...editingTask, name: e.target.value })}
                      className="w-full bg-white border border-slate-300 rounded-lg p-2 text-xs font-bold text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500"
                    />
                  </div>

                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-xs font-bold text-slate-700 uppercase mb-1">Assignee Owner</label>
                      <input
                        type="text"
                        required
                        value={editingTask.owner}
                        onChange={(e) => setEditingTask({ ...editingTask, owner: e.target.value })}
                        className="w-full bg-white border border-slate-300 rounded-lg p-2 text-xs font-semibold text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500"
                      />
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-slate-700 uppercase mb-1">Prerequisites / Dependencies</label>
                      <input
                        type="text"
                        value={editingTask.dependencies}
                        onChange={(e) => setEditingTask({ ...editingTask, dependencies: e.target.value })}
                        className="w-full bg-white border border-slate-300 rounded-lg p-2 text-xs font-semibold text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500"
                      />
                    </div>
                  </div>

                  <div className="grid grid-cols-3 gap-3">
                    <div>
                      <label className="block text-xs font-bold text-slate-700 uppercase mb-1">Status</label>
                      <select
                        value={editingTask.status}
                        onChange={(e) => setEditingTask({ 
                          ...editingTask, 
                          status: e.target.value,
                          complete: e.target.value === 'Complete' ? 100 : editingTask.complete 
                        })}
                        className="w-full bg-white border border-slate-300 rounded-lg p-2 text-xs font-bold text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500"
                      >
                        {statusesList.filter(s => s !== 'All').map(s => (
                          <option key={s} value={s}>{s}</option>
                        ))}
                      </select>
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-slate-700 uppercase mb-1">Priority</label>
                      <select
                        value={editingTask.priority}
                        onChange={(e) => setEditingTask({ ...editingTask, priority: e.target.value })}
                        className="w-full bg-white border border-slate-300 rounded-lg p-2 text-xs font-bold text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500"
                      >
                        {prioritiesList.filter(p => p !== 'All').map(p => (
                          <option key={p} value={p}>{p}</option>
                        ))}
                      </select>
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-slate-700 uppercase mb-1">Completion %</label>
                      <input
                        type="number"
                        min="0"
                        max="100"
                        value={editingTask.complete}
                        onChange={(e) => {
                          const val = parseInt(e.target.value) || 0;
                          setEditingTask({ 
                            ...editingTask, 
                            complete: Math.min(100, Math.max(0, val)),
                            status: val === 100 ? 'Complete' : editingTask.status === 'Complete' ? 'In Progress' : editingTask.status
                          });
                        }}
                        className="w-full bg-white border border-slate-300 rounded-lg p-2 text-xs font-bold text-slate-700"
                      />
                    </div>
                  </div>

                  <div className="p-3 bg-slate-50 rounded-xl border border-slate-200">
                    <span className="block text-xs font-bold text-slate-800 uppercase mb-2">Timeline Duration (April '26 - July '27)</span>
                    <div className="grid grid-cols-2 gap-4">
                      <div>
                        <label className="block text-[10px] text-slate-500 font-semibold uppercase">Start Month</label>
                        <select
                          value={editingTask.start}
                          onChange={(e) => setEditingTask({ ...editingTask, start: parseInt(e.target.value) })}
                          className="w-full bg-white border border-slate-300 rounded-lg p-1.5 text-xs font-bold text-slate-700"
                        >
                          {months.map((m, idx) => (
                            <option key={m} value={idx}>{m}</option>
                          ))}
                        </select>
                      </div>
                      <div>
                        <label className="block text-[10px] text-slate-500 font-semibold uppercase">End Month</label>
                        <select
                          value={editingTask.end}
                          onChange={(e) => setEditingTask({ ...editingTask, end: Math.max(editingTask.start, parseInt(e.target.value)) })}
                          className="w-full bg-white border border-slate-300 rounded-lg p-1.5 text-xs font-bold text-slate-700"
                        >
                          {months.map((m, idx) => (
                            <option key={m} value={idx} disabled={idx < editingTask.start}>{m}</option>
                          ))}
                        </select>
                      </div>
                    </div>
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-slate-700 uppercase mb-1">Progress Notes / Roadblocks</label>
                    <textarea
                      value={editingTask.notes || ""}
                      onChange={(e) => setEditingTask({ ...editingTask, notes: e.target.value })}
                      className="w-full bg-white border border-slate-300 rounded-lg p-2 text-xs font-medium text-slate-700"
                      rows="2"
                    />
                  </div>

                  <div className="flex items-center justify-end gap-2.5 pt-3 border-t border-slate-100">
                    <button
                      type="button"
                      onClick={() => setIsTaskModalOpen(false)}
                      className="px-4 py-2 text-xs font-bold text-slate-500 bg-slate-100 hover:bg-slate-200 rounded-lg"
                    >
                      Cancel
                    </button>
                    <button
                      type="submit"
                      className="px-5 py-2 text-xs font-bold text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg shadow"
                    >
                      Save Deliverable
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* Export Modal */}
          {isExportModalOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4 animate-fade-in">
              <div className="bg-white rounded-2xl border border-slate-200 shadow-2xl w-full max-w-2xl overflow-hidden animate-slide-up">
                <div className="p-5 bg-gradient-to-r from-slate-900 to-indigo-950 text-white flex items-center justify-between">
                  <div>
                    <h3 className="text-lg font-bold">Export Roadmap to CSV</h3>
                    <p className="text-xs text-indigo-200">Copy implementation spreadsheet config below</p>
                  </div>
                  <button 
                    type="button"
                    onClick={() => setIsExportModalOpen(false)}
                    className="text-slate-300 hover:text-white font-bold text-xl p-1 bg-white/10 hover:bg-white/25 rounded-full w-8 h-8 flex items-center justify-center transition"
                  >
                    ×
                  </button>
                </div>

                <div className="p-6 space-y-4">
                  <p className="text-xs text-slate-500 leading-relaxed">
                    Copy the raw comma-separated values (CSV) below and paste them into a spreadsheet editor (such as Microsoft Excel or Google Sheets) to save progress externally.
                  </p>
                  
                  <textarea
                    readOnly
                    value={generateCSVData()}
                    className="w-full h-64 bg-slate-50 border border-slate-300 rounded-lg p-3 font-mono text-[10px] text-slate-700 focus:outline-none"
                    onClick={(e) => e.target.select()}
                  />

                  <div className="flex items-center justify-between pt-3 border-t border-slate-100">
                    <span className="text-[10px] text-slate-400 font-semibold">Click inside the text block to select all values</span>
                    <button
                      type="button"
                      onClick={() => {
                        document.execCommand('copy');
                        alert("Data copied to clipboard!");
                      }}
                      className="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold rounded-lg shadow transition"
                    >
                      Copy Raw Text
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // Safely boot the React application using standard UMD mounting rules
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
